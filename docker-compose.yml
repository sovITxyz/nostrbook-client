services:
  nostrbook-server:
    build:
      context: .
      target: server
    restart: unless-stopped
    env_file: server/.env
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "file:../data/nostrbook.db"
      NOSTR_PRIVATE_RELAY: "ws://nostrbook-relay:7777"
      BASE_PATH: ""
      YOUTUBE_CHANNEL_ID: ""
      TWITTER_COOKIES_PATH: "/app/twitter-cookies.txt"
    volumes:
      - nostrbook-data:/app/data
      - nostrbook-uploads:/app/uploads
    networks:
      - nostrbook-net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nostrbook-relay:
    build:
      context: ./relay
    restart: unless-stopped
    environment:
      WS_PORT: "7777"
      WS_HOST: "0.0.0.0"
      STORAGE_PATH: "/app/data"
      SWARM_TOPIC: "${SWARM_TOPIC:-nostrbook}"
      RELAY_NAME: "${RELAY_NAME:-nostrbook relay}"
      RELAY_DESCRIPTION: "${RELAY_DESCRIPTION:-Community relay powered by nostr-swarm}"
      RELAY_CONTACT: "${RELAY_CONTACT:-}"
      WOT_OWNER_PUBKEY: "${COMMUNITY_OWNER_PUBKEY:-}"
      WOT_MAX_DEPTH: "${WOT_MAX_DEPTH:-3}"
      WOT_DISCOVERY: "true"
    volumes:
      - relay-data:/app/data
    networks:
      - nostrbook-net
    deploy:
      resources:
        limits:
          memory: 512M

  nostrbook-translate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "en,es"
      LT_DISABLE_WEB_UI: "true"
    networks:
      - nostrbook-net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/languages')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nostrbook-nginx:
    build:
      context: .
      target: nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - nostrbook-uploads:/app/uploads:ro
    depends_on:
      nostrbook-server:
        condition: service_healthy
    networks:
      - nostrbook-net
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  nostrbook-data:
  nostrbook-uploads:
  relay-data:

networks:
  nostrbook-net:
    driver: bridge
