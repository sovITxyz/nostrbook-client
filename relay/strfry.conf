##
## strfry configuration — BIES Private Relay
##

# Database directory
db = "./strfry-db/"

dbParams {
    # Maximum number of threads/open transactions
    maxreaders = 256

    # Size of mmap() - use 1GB for production
    mapsize = 1073741824
}

relay {
    # Relay info (NIP-11)
    info {
        name = "BIES Private Relay"
        description = "Private Nostr relay for the Build in El Salvador platform"
        pubkey = ""
        contact = "admin@sovit.xyz"
    }

    # Bind address and port
    bind = "0.0.0.0"
    port = 7777

    # Set to true to require NIP-42 auth for read access
    nofiles = 0

    # Maximum WebSocket message size (bytes)
    maxWebsocketPayloadSize = 131072

    # Maximum number of events returned per filter
    maxFilterLimit = 500

    # Logging
    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
    }

    # Number of threads
    numThreads {
        ingestion = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    # Write policy plugin — checks pubkey against whitelist
    writePolicy {
        plugin = "/app/write-policy.sh"
    }
}
