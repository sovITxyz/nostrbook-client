<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="ng" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon: relay N -->
  <g transform="translate(10,10) scale(0.195)">
    <circle cx="256" cy="256" r="250" fill="#312e81"/>
    <line x1="160" y1="380" x2="160" y2="130" stroke="#818cf8" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="160" y1="130" x2="352" y2="380" stroke="#818cf8" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="352" y1="380" x2="352" y2="130" stroke="#818cf8" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="160" y1="255" x2="100" y2="200" stroke="#818cf8" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="352" y1="255" x2="412" y2="200" stroke="#818cf8" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <circle cx="160" cy="380" r="16" fill="url(#ng)" filter="url(#g)"/>
    <circle cx="160" cy="130" r="16" fill="url(#ng)" filter="url(#g)"/>
    <circle cx="352" cy="380" r="16" fill="url(#ng)" filter="url(#g)"/>
    <circle cx="352" cy="130" r="16" fill="url(#ng)" filter="url(#g)"/>
    <circle cx="256" cy="255" r="10" fill="url(#ng)" filter="url(#g)"/>
    <circle cx="100" cy="200" r="7" fill="#818cf8" opacity="0.4"/>
    <circle cx="412" cy="200" r="7" fill="#818cf8" opacity="0.4"/>
  </g>
  <!-- Wordmark -->
  <text x="125" y="73" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-0.5">nostrbook</text>
</svg>
