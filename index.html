<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0047ab" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nostrbook" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>Nostrbook</title>
</head>

<body style="margin:0;background:#0A192F;">
  <div id="root">
    <!-- Splash screen shown while JS loads — React replaces this -->
    <div id="splash" style="position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:#0A192F;z-index:999999;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="120" height="120">
        <path fill="#ff5b00" d="M539.97,0C241.73,0-.03,241.76-.03,540s241.76,540,540,540,540.07-241.76,540.07-540S838.2,0,539.97,0ZM539.97,998.16c-252.99,0-458.17-205.11-458.17-458.17S286.98,81.83,539.97,81.83s458.17,205.11,458.17,458.17-205.11,458.17-458.17,458.17Z"/>
        <path fill="#f9f5f4" d="M362.5,219.18h196.15c118.32,0,165.17,61.15,165.17,159.62v15.87c0,72.27-30.17,108.8-77.82,127.86,52.41,19.06,87.35,62.74,87.35,142.14v15.88c0,120.7-46.06,180.27-169.15,180.27h-201.71V219.18ZM546.74,481.25c38.91,0,62.74-11.92,62.74-63.53v-42.89c0-50.82-19.85-61.14-61.95-61.14h-73.06v167.56h72.26ZM550.7,766.33c52.41,0,67.5-15.08,67.5-69.09v-51.62c0-50.82-19.85-69.88-67.5-69.88h-76.23v190.59h76.23Z"/>
      </svg>
    </div>
  </div>
  <script>
    // Capture fatal JS errors that prevent React from mounting
    window.addEventListener('error', function (e) {
      var s = document.getElementById('splash');
      if (s && !s._errShown) {
        s._errShown = true;
        var d = document.createElement('div');
        d.style.cssText = 'margin-top:2rem;padding:1rem;text-align:center;color:#ff6b6b;font:13px monospace;max-width:90vw;word-break:break-all';
        d.textContent = e.message + ' (' + (e.filename || '').split('/').pop() + ':' + e.lineno + ')';
        s.appendChild(d);
      }
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Splash-screen watchdog: if React hasn't replaced #splash within 8s,
    // show a reload prompt so the user isn't stuck on a blank logo forever.
    (function () {
      var t = setTimeout(function () {
        var s = document.getElementById('splash');
        if (s) {
          var d = document.createElement('div');
          d.style.cssText = 'margin-top:2rem;text-align:center;color:rgba(255,255,255,0.7);font:14px system-ui,sans-serif';
          d.innerHTML = '<p>Taking longer than expected\u2026</p>'
            + '<button onclick="location.reload()" style="margin-top:0.75rem;padding:0.5rem 1.5rem;background:#FF5B00;color:#fff;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer">Reload</button>';
          s.appendChild(d);
        }
      }, 8000);
      // Cancel the watchdog once React mounts (splash div gets removed)
      var obs = new MutationObserver(function () {
        if (!document.getElementById('splash')) { clearTimeout(t); obs.disconnect(); }
      });
      obs.observe(document.getElementById('root'), { childList: true });
    })();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          reg.update();
        }).catch(() => {});
      });
    }
  </script>
</body>

</html>
